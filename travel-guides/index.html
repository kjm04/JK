<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Guides</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #06080a; color: #f0f0f0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(167,139,250,0.04) 0%, transparent 50%),
                  #06080a;
    }
    .container { max-width: 700px; width: 100%; padding: 40px 24px; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg, #f0f0f0, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { color: #7a8494; margin-bottom: 48px; font-size: 1rem; }
    .guides { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .guide-card {
      background: #0f1215; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; overflow: hidden; text-decoration: none;
      transition: all 0.3s ease; display: block;
    }
    .guide-card:hover { border-color: rgba(56,189,248,0.25); transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
    .guide-thumb { width: 100%; height: 200px; object-fit: cover; }
    .guide-info { padding: 24px; }
    .guide-tag { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 0.72rem;
      font-weight: 600; background: rgba(56,189,248,0.1); color: #38bdf8;
      border: 1px solid rgba(56,189,248,0.15); margin-bottom: 12px; }
    .guide-title { font-size: 1.25rem; font-weight: 700; color: #f0f0f0; margin-bottom: 8px; }
    .guide-desc { font-size: 0.85rem; color: #7a8494; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✈️ Travel Guides</h1>
    <p class="sub">Explore our curated travel guides</p>
    <div class="guides">
      <a href="vancouver-travel-guide.html" class="guide-card">
        <img src="stanley_park.png" alt="Vancouver" class="guide-thumb">
        <div class="guide-info">
          <span class="guide-tag">🇨🇦 Canada · July 2026</span>
          <div class="guide-title">Vancouver & Banff</div>
          <div class="guide-desc">Stanley Park, Capilano Bridge, Grouse Mountain, Joffre Lakes, Banff & Lake Louise</div>
        </div>
      </a>
      <a href="zhangjiajie_travel_guide.html" class="guide-card">
        <img src="tianmenshan.png" alt="Zhangjiajie" class="guide-thumb">
        <div class="guide-info">
          <span class="guide-tag">🇨🇳 China</span>
          <div class="guide-title">Zhangjiajie 장가계</div>
          <div class="guide-desc">Avatar Mountains, Tianmen Mountain, Glass Bridge, Golden Whip Stream</div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
